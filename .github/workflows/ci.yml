name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: ruff check
        run: uvx ruff check distil tests
      - name: mypy (the package ships py.typed — keep it actually typed)
        run: uvx mypy --python-version 3.12 --ignore-missing-imports distil

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # aiohttp + pytest-asyncio so the async proxy (distil/aproxy.py, the
      # [async] extra) is exercised and counted. Genuinely-external code (torch
      # training loop, live-model proof-harness runners) is omitted in
      # [tool.coverage.run] — see the justification there. Floor climbs as
      # coverage does; it may only ratchet up, never erode.
      - name: pytest with coverage floor
        run: uv run --with pytest --with pytest-asyncio --with aiohttp --with pytest-cov python -m pytest -q --cov=distil --cov-fail-under=90

  gate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # 3.9 is the floor (what macOS ships as system python3) — keep it green so
        # `pipx install distil-llm` works on stock Python, not just newer ones.
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Tests
        run: uv run --with pytest python -m pytest -q
      - name: Non-inferiority gate (every domain must certify)
        run: uv run distil bench
      - name: Byte-fidelity gate (reversible + append-only)
        run: uv run distil verify

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo test
        run: cargo test --manifest-path rust/distil-core/Cargo.toml
      - name: cargo clippy
        run: cargo clippy --manifest-path rust/distil-core/Cargo.toml -- -D warnings
