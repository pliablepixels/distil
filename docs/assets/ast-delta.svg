<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" font-family="Inter,ui-sans-serif,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="adbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0c13"/><stop offset="1" stop-color="#06070b"/></linearGradient>
    <linearGradient id="adg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <linearGradient id="adcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12151f"/><stop offset="1" stop-color="#0b0d15"/></linearGradient>
    <pattern id="addots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.022"/></pattern>
    <filter id="adsh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.5"/></filter>
    <marker id="adar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7390"/></marker>
  </defs>
  <rect width="1200" height="430" fill="url(#adbg)"/>
  <rect width="1200" height="430" fill="url(#addots)"/>

  <text x="48" y="52" font-size="23" font-weight="800" letter-spacing="-0.3" fill="#f2f3f7">AST-structural delta <tspan fill="#8b91a3" font-weight="500" font-size="15">— diff by parsed structure, not by lines</tspan></text>
  <text x="48" y="76" font-size="13" fill="#8b91a3">Each top-level definition is fingerprinted with <tspan fill="#cdd3e2" font-family="ui-monospace,monospace">ast.dump</tspan> — invariant to whitespace, comments, and import order.</text>

  <!-- prior version -->
  <g transform="translate(64,108)"><rect width="300" height="280" rx="14" fill="url(#adcard)" stroke="#252c3e" filter="url(#adsh)"/>
    <text x="18" y="30" font-size="12.5" font-weight="700" fill="#eef0f5">prior version <tspan fill="#5b6177" font-weight="500">(in cached context)</tspan></text>
    <g font-family="ui-monospace,monospace" font-size="11" fill="#9aa1b3">
      <rect x="16" y="46" width="268" height="46" rx="8" fill="#0e1320" stroke="#222a3e"/><text x="28" y="64" fill="#cdd3e2">def helper(x):</text><text x="28" y="82">    … 12 lines …</text>
      <rect x="16" y="100" width="268" height="46" rx="8" fill="#0e1320" stroke="#222a3e"/><text x="28" y="118" fill="#cdd3e2">def process(data):</text><text x="28" y="136">    return [helper(d) …]</text>
      <rect x="16" y="154" width="268" height="46" rx="8" fill="#0e1320" stroke="#222a3e"/><text x="28" y="172" fill="#cdd3e2">class Config:</text><text x="28" y="190">    … 14 lines …</text>
      <rect x="16" y="208" width="268" height="30" rx="8" fill="#0e1320" stroke="#222a3e"/><text x="28" y="227" fill="#cdd3e2">import os, sys, json</text>
    </g>
  </g>

  <!-- new version (reformatted + one logic change) -->
  <g transform="translate(450,108)"><rect width="300" height="280" rx="14" fill="url(#adcard)" stroke="#252c3e" filter="url(#adsh)"/>
    <text x="18" y="30" font-size="12.5" font-weight="700" fill="#eef0f5">re-read <tspan fill="#ff8a6b" font-weight="500">(reformatted + 1 edit)</tspan></text>
    <g font-family="ui-monospace,monospace" font-size="11" fill="#9aa1b3">
      <rect x="16" y="46" width="268" height="46" rx="8" fill="#0e1320" stroke="#2a3450"/><text x="28" y="64" fill="#cdd3e2">def helper(x):   # reflowed</text><text x="28" y="82" fill="#5ad19a">same AST → unchanged</text>
      <rect x="16" y="100" width="268" height="46" rx="8" fill="#161226" stroke="#3a2f63"/><text x="28" y="118" fill="#cdd3e2">def process(data):</text><text x="28" y="136" fill="#b9a7ff">return [helper(d) * 2 …]  changed</text>
      <rect x="16" y="154" width="268" height="46" rx="8" fill="#0e1320" stroke="#2a3450"/><text x="28" y="172" fill="#cdd3e2">class Config:</text><text x="28" y="190" fill="#5ad19a">same AST → unchanged</text>
      <rect x="16" y="208" width="268" height="30" rx="8" fill="#0e1320" stroke="#2a3450"/><text x="28" y="227" fill="#5ad19a">imports reordered → unchanged</text>
    </g>
  </g>

  <line x1="372" y1="248" x2="442" y2="248" stroke="#6b7390" stroke-width="1.6" marker-end="url(#adar)"/>
  <line x1="758" y1="248" x2="828" y2="248" stroke="#6b7390" stroke-width="1.6" marker-end="url(#adar)"/>

  <!-- the structural delta sent -->
  <g transform="translate(836,108)"><rect width="300" height="280" rx="14" fill="url(#adcard)" stroke="url(#adg)" stroke-width="1.5" filter="url(#adsh)"/>
    <text x="18" y="30" font-size="12.5" font-weight="800" fill="url(#adg)">structural delta sent</text>
    <g font-size="11.5">
      <rect x="16" y="44" width="268" height="58" rx="9" fill="#0e1320" stroke="#23402f"/>
      <text x="28" y="64" fill="#5ad19a" font-weight="700">unchanged (still in context):</text>
      <text x="28" y="84" fill="#9aa1b3" font-family="ui-monospace,monospace" font-size="10.5">helper, Config, imports</text>
      <rect x="16" y="110" width="268" height="74" rx="9" fill="#161226" stroke="#3a2f63"/>
      <text x="28" y="130" fill="#b9a7ff" font-weight="700">changed def process:</text>
      <text x="28" y="150" fill="#cdd3e2" font-family="ui-monospace,monospace" font-size="10.5">def process(data):</text>
      <text x="28" y="166" fill="#cdd3e2" font-family="ui-monospace,monospace" font-size="10.5">  return [helper(d) * 2 …]</text>
    </g>
    <text x="166" y="214" text-anchor="middle" font-size="30" font-weight="800" fill="url(#adg)">1 / 3 defs</text>
    <text x="166" y="234" text-anchor="middle" font-size="11" fill="#8b91a3">sent in full — the rest referenced</text>
    <text x="166" y="262" text-anchor="middle" font-size="10" fill="#5b6177">reversible via distil_expand · decision-equivalent</text>
  </g>

  <text x="600" y="416" text-anchor="middle" font-size="12.5" fill="#8b91a3">Textual diff explodes on the reformat; the structural delta isolates exactly the one definition whose <tspan fill="#eef0f5" font-weight="600">meaning</tspan> changed.</text>
</svg>
