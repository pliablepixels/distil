<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6173"/></marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e7e9ee">Architecture <tspan fill="#5b6173" font-weight="400" font-size="14">— a cost-optimized cache hierarchy with a contract on quality</tspan></text>

  <!-- input -->
  <g transform="translate(40,110)">
    <rect width="150" height="120" rx="14" fill="#0c0e14" stroke="#23284a"/>
    <text x="16" y="30" font-size="14" font-weight="700" fill="#e7e9ee">Agent context</text>
    <text x="16" y="56" font-size="11" fill="#8b91a1">system + tools</text>
    <text x="16" y="74" font-size="11" fill="#8b91a1">history (growing)</text>
    <text x="16" y="92" font-size="11" fill="#8b91a1">tool outputs</text>
    <text x="16" y="110" font-size="11" fill="#8b91a1">retrieved docs</text>
  </g>
  <line x1="190" y1="170" x2="232" y2="170" stroke="#5b6173" stroke-width="2" marker-end="url(#arr)"/>

  <!-- compression tiers -->
  <g transform="translate(240,84)">
    <rect width="430" height="172" rx="16" fill="#0b0d16" stroke="#1b1f2a"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#5ad1c9">COMPRESSION — risk-graded, reversible</text>
    <g transform="translate(20,44)">
      <rect width="124" height="108" rx="10" fill="#0f1219" stroke="#23284a"/>
      <text x="12" y="24" font-size="12" font-weight="700" fill="#e7e9ee">Tier 0</text>
      <text x="12" y="44" font-size="10.5" fill="#8b91a1">JSON minify,</text>
      <text x="12" y="60" font-size="10.5" fill="#8b91a1">reversible RLE,</text>
      <text x="12" y="76" font-size="10.5" fill="#8b91a1">schema canon.</text>
      <text x="12" y="98" font-size="10" fill="#5ad19a">provably lossless</text>
    </g>
    <g transform="translate(154,44)">
      <rect width="124" height="108" rx="10" fill="#0f1219" stroke="#23284a"/>
      <text x="12" y="24" font-size="12" font-weight="700" fill="#e7e9ee">Tier 1</text>
      <text x="12" y="44" font-size="10.5" fill="#8b91a1">decision-aware</text>
      <text x="12" y="60" font-size="10.5" fill="#8b91a1">digest +</text>
      <text x="12" y="76" font-size="10.5" fill="#8b91a1">retrieval handle</text>
      <text x="12" y="98" font-size="10" fill="#5ad19a">reversible</text>
    </g>
    <g transform="translate(288,44)">
      <rect width="124" height="108" rx="10" fill="#0f1219" stroke="#23284a"/>
      <text x="12" y="24" font-size="12" font-weight="700" fill="#e7e9ee">Stabilize</text>
      <text x="12" y="44" font-size="10.5" fill="#8b91a1">lift volatile</text>
      <text x="12" y="60" font-size="10.5" fill="#8b91a1">fields out of</text>
      <text x="12" y="76" font-size="10.5" fill="#8b91a1">the prefix</text>
      <text x="12" y="98" font-size="10" fill="#5ad19a">keeps cache warm</text>
    </g>
  </g>
  <line x1="670" y1="170" x2="712" y2="170" stroke="#5b6173" stroke-width="2" marker-end="url(#arr)"/>

  <!-- cache-aware engine -->
  <g transform="translate(720,110)">
    <rect width="180" height="120" rx="14" fill="#0c0e14" stroke="#23284a"/>
    <text x="16" y="30" font-size="14" font-weight="700" fill="#e7e9ee">Cache-aware</text>
    <text x="16" y="48" font-size="14" font-weight="700" fill="#e7e9ee">budget</text>
    <text x="16" y="72" font-size="11" fill="#8b91a1">stable prefix → cache</text>
    <text x="16" y="90" font-size="11" fill="#8b91a1">read (~0.1×)</text>
    <text x="16" y="108" font-size="11" fill="#8b91a1">compress only the tail</text>
  </g>
  <line x1="900" y1="170" x2="942" y2="170" stroke="#5b6173" stroke-width="2" marker-end="url(#arr)"/>

  <!-- output -->
  <g transform="translate(950,110)">
    <rect width="210" height="120" rx="14" fill="#0f1326" stroke="#2a2550"/>
    <text x="16" y="30" font-size="14" font-weight="700" fill="url(#g)">Compressed request</text>
    <text x="16" y="58" font-size="12" fill="#e7e9ee">33% cheaper / turn</text>
    <text x="16" y="80" font-size="11" fill="#8b91a1">losslessly</text>
    <text x="16" y="104" font-size="11" fill="#5b6173">+ local restore table</text>
  </g>

  <!-- bottom: the contract loop -->
  <g transform="translate(240,300)">
    <rect width="920" height="170" rx="16" fill="#0b0d16" stroke="#23284a"/>
    <text x="20" y="30" font-size="13" font-weight="700" fill="#8b7bff">THE QUALITY CONTRACT — measurement that produces the policy</text>

    <g transform="translate(24,52)">
      <rect width="200" height="92" rx="10" fill="#0f1219" stroke="#1b1f2a"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#e7e9ee">Causal ablation</text>
      <text x="14" y="48" font-size="10.5" fill="#8b91a1">remove a span, replay —</text>
      <text x="14" y="64" font-size="10.5" fill="#8b91a1">did any decision change?</text>
      <text x="14" y="82" font-size="10" fill="#5ad1c9">finds free-to-drop context</text>
    </g>
    <g transform="translate(244,52)">
      <rect width="200" height="92" rx="10" fill="#0f1219" stroke="#1b1f2a"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#e7e9ee">Decision-equivalence</text>
      <text x="14" y="48" font-size="10.5" fill="#8b91a1">same action with vs.</text>
      <text x="14" y="64" font-size="10.5" fill="#8b91a1">without compression?</text>
      <text x="14" y="82" font-size="10" fill="#5ad1c9">on real trajectories</text>
    </g>
    <g transform="translate(464,52)">
      <rect width="200" height="92" rx="10" fill="#0f1219" stroke="#1b1f2a"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="#e7e9ee">TOST gate</text>
      <text x="14" y="48" font-size="10.5" fill="#8b91a1">statistical non-inferiority</text>
      <text x="14" y="64" font-size="10.5" fill="#8b91a1">at a pre-registered margin</text>
      <text x="14" y="82" font-size="10" fill="#5ad1c9">ship only if certified</text>
    </g>
    <g transform="translate(684,52)">
      <rect width="212" height="92" rx="10" fill="#0f1326" stroke="#2a2550"/>
      <text x="14" y="26" font-size="12" font-weight="700" fill="url(#g)">Verdict</text>
      <text x="14" y="50" font-size="13" fill="#5ad19a">distil → PASS</text>
      <text x="14" y="72" font-size="13" fill="#ff8a6b">aggressive → FAIL</text>
      <text x="14" y="88" font-size="9.5" fill="#5b6173">measured on the same runs</text>
    </g>
  </g>
</svg>
