<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" font-family="Inter,ui-sans-serif,Segoe UI,Roboto,sans-serif" role="img" aria-label="Distil architecture: agent to cache-aware compression pipeline to upstream LLM, with the recovery loop and the decision-equivalence quality contract">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0c13"/><stop offset="1" stop-color="#06070b"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <linearGradient id="acard" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12151f"/><stop offset="1" stop-color="#0b0d15"/></linearGradient>
    <linearGradient id="ahero" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141a2e"/><stop offset="1" stop-color="#0c0f1d"/></linearGradient>
    <pattern id="adots2" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#fff" opacity="0.02"/></pattern>
    <filter id="ash" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="aglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="aar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7d8cff"/></marker>
    <marker id="aarb" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5ad19a"/></marker>
    <style>
      .flow{stroke-dasharray:5 10;animation:dash 1.1s linear infinite}
      @keyframes dash{to{stroke-dashoffset:-30}}
      .rflow{stroke-dasharray:4 9;animation:rdash 1.4s linear infinite}
      @keyframes rdash{to{stroke-dashoffset:26}}
      .pulse{animation:pulse 2.4s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}
      .puck{animation:puck 2.6s ease-in-out infinite}
      @keyframes puck{0%,100%{opacity:.5}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){.flow,.rflow,.pulse,.puck{animation:none}}
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#abg)"/><rect width="1200" height="600" fill="url(#adots2)"/>

  <text x="48" y="50" font-size="24" font-weight="800" letter-spacing="-0.4" fill="#f2f3f7">How Distil works <tspan fill="#8b91a3" font-weight="500" font-size="15">— a cache-aware compression pipeline with a quality contract</tspan></text>

  <g font-size="10.5" letter-spacing="2" fill="#5b6177" font-weight="700" text-anchor="middle"><text x="125" y="92">AGENT</text><text x="600" y="92">DISTIL PROXY · localhost</text><text x="1075" y="92">PROVIDER</text></g>

  <line x1="232" y1="170" x2="316" y2="170" stroke="#7d8cff" stroke-width="2.4" class="flow" marker-end="url(#aar)"/>
  <line x1="884" y1="170" x2="966" y2="170" stroke="#7d8cff" stroke-width="2.4" class="flow" marker-end="url(#aar)"/>

  <g transform="translate(48,128)"><rect width="184" height="84" rx="14" fill="url(#acard)" stroke="#252c3e" filter="url(#ash)"/>
    <text x="18" y="30" font-size="13.5" font-weight="700" fill="#eef0f5">Claude Code · Codex</text>
    <text x="18" y="49" font-size="13.5" font-weight="700" fill="#eef0f5">Gemini · any SDK</text>
    <text x="18" y="69" font-size="10.5" fill="#8b91a3">re-sends full context every turn</text>
  </g>
  <rect x="240" y="162" width="70" height="16" rx="4" fill="#8b7bff" opacity="0.45" class="puck"/>

  <g filter="url(#aglow)" opacity="0.16"><rect x="320" y="108" width="560" height="300" rx="20" fill="#5ad1c9"/></g>
  <rect x="320" y="108" width="560" height="300" rx="20" fill="url(#ahero)" stroke="url(#ag)" stroke-width="1.6"/>
  <text x="600" y="138" text-anchor="middle" font-size="14" font-weight="800" fill="url(#ag)">compress → cache-pin → forward</text>

  <g font-size="11" text-anchor="middle">
    <g><rect x="342" y="156" width="120" height="46" rx="10" fill="#0e1320" stroke="#222a3e"/><text x="402" y="178" fill="#cdd3e2" font-weight="700">Tier-0</text><text x="402" y="193" fill="#8b91a3" font-size="9.5">lossless (verbatim)</text></g>
    <g><rect x="474" y="156" width="120" height="46" rx="10" fill="#0e1320" stroke="#222a3e"/><text x="534" y="178" fill="#cdd3e2" font-weight="700">Tier-1 digest</text><text x="534" y="193" fill="#8b91a3" font-size="9.5">reversible</text></g>
    <g><rect x="606" y="156" width="120" height="46" rx="10" fill="#0e1320" stroke="#222a3e"/><text x="666" y="178" fill="#cdd3e2" font-weight="700">causal prune</text><text x="666" y="193" fill="#8b91a3" font-size="9.5">ablation-proven</text></g>
    <g><rect x="738" y="156" width="120" height="46" rx="10" fill="#0e1320" stroke="#222a3e"/><text x="798" y="178" fill="#cdd3e2" font-weight="700">salience</text><text x="798" y="193" fill="#8b91a3" font-size="9.5">model-free</text></g>
  </g>
  <g stroke="#33405e" stroke-width="1.3" fill="none"><path d="M462,179 L474,179"/><path d="M594,179 L606,179"/><path d="M726,179 L738,179"/></g>

  <rect x="342" y="220" width="516" height="34" rx="9" fill="#0e1320" stroke="#23402f"/>
  <circle cx="362" cy="237" r="3.5" fill="#5ad19a" class="puck"/>
  <text x="376" y="241" font-size="11" fill="#cdd3e2">cache-aware placement — stable prefix pinned at the <tspan fill="#5ad19a" font-weight="700">0.1× cache-read</tspan> rate; only the volatile suffix changes</text>

  <g transform="translate(342,268)"><rect width="246" height="58" rx="10" fill="#0e1320" stroke="#2c3658"/><text x="14" y="24" font-size="11.5" font-weight="700" fill="#b9a7ff">RestoreStore</text><text x="14" y="42" font-size="10" fill="#8b91a3">originals kept locally · 0 tokens on the wire</text><text x="14" y="54" font-size="9.5" fill="#5b6177">never sent to the model</text></g>
  <g transform="translate(602,268)"><rect width="256" height="58" rx="10" fill="#0e1320" stroke="#2c3658"/><text x="14" y="24" font-size="11.5" font-weight="700" fill="#5ad1c9">distil_expand</text><text x="14" y="42" font-size="10" fill="#8b91a3">model recovers any digested detail</text><text x="14" y="54" font-size="9.5" fill="#5b6177">transparent re-query · PAYG</text></g>

  <rect x="888" y="166" width="24" height="9" rx="3" fill="#5ad1c9" class="puck"/>

  <g transform="translate(966,128)"><rect width="186" height="84" rx="14" fill="url(#acard)" stroke="#252c3e" filter="url(#ash)"/>
    <text x="18" y="30" font-size="13.5" font-weight="700" fill="#eef0f5">Anthropic · OpenAI</text>
    <text x="18" y="49" font-size="13.5" font-weight="700" fill="#eef0f5">Google Gemini</text>
    <text x="18" y="69" font-size="10.5" fill="#8b91a3">prompt cache + LLM</text>
  </g>

  <path d="M1059,212 C1059,360 980,430 600,430 C320,430 250,360 140,300 L140,216" fill="none" stroke="#5ad19a" stroke-width="2" class="rflow" marker-end="url(#aarb)"/>
  <text x="600" y="423" text-anchor="middle" font-size="10.5" fill="#5ad19a">response → transparent expand loop → agent (it just gets the right answer)</text>

  <text x="48" y="486" font-size="11" letter-spacing="2" font-weight="700" fill="#5b6177">THE QUALITY CONTRACT — every operating point is certified decision-equivalent</text>
  <g transform="translate(48,498)"><rect width="360" height="78" rx="14" fill="url(#acard)" stroke="#252c3e" filter="url(#ash)"/>
    <circle cx="26" cy="30" r="6" fill="#8b7bff" class="pulse"/><text x="44" y="28" font-size="13" font-weight="700" fill="#eef0f5">Decision-Equivalence Certificate</text>
    <text x="20" y="50" font-size="10.5" fill="#8b91a3">conformal risk control (LTT/CRC) · distribution-free</text>
    <text x="20" y="66" font-size="10.5" fill="#8b91a3">P(decision-change ≤ α) ≥ 1 − δ</text>
  </g>
  <g transform="translate(420,498)"><rect width="360" height="78" rx="14" fill="url(#acard)" stroke="#252c3e" filter="url(#ash)"/>
    <circle cx="26" cy="30" r="6" fill="#5ad1c9" class="pulse"/><text x="44" y="28" font-size="13" font-weight="700" fill="#eef0f5">Shadow mode — live</text>
    <text x="20" y="50" font-size="10.5" fill="#8b91a3">samples real traffic, runs it both ways</text>
    <text x="20" y="66" font-size="10.5" fill="#8b91a3">rolling decision-change rate · streaming-aware</text>
  </g>
  <g transform="translate(792,498)"><rect width="360" height="78" rx="14" fill="url(#acard)" stroke="#252c3e" filter="url(#ash)"/>
    <circle cx="26" cy="30" r="6" fill="#5ad19a" class="pulse"/><text x="44" y="28" font-size="13" font-weight="700" fill="#eef0f5">Learned keep-model — flywheel</text>
    <text x="20" y="50" font-size="10.5" fill="#8b91a3">every expand is a label; only ever gets</text>
    <text x="20" y="66" font-size="10.5" fill="#8b91a3">more conservative — never-regressing</text>
  </g>
</svg>
