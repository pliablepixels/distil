<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif" role="img" aria-label="Distil — compression with a quality contract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/>
    </linearGradient>
    <linearGradient id="d-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad1c9"/><stop offset=".5" stop-color="#5ad19a"/><stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#2a2360" stop-opacity="0.9"/><stop offset="1" stop-color="#06070a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d-glow" cx=".5" cy=".76" r=".46">
      <stop offset="0" stop-color="#5ad1c9" stop-opacity=".55"/><stop offset="1" stop-color="#5ad1c9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#glow)"/>
  <g opacity="0.18" fill="#8b7bff">
    <circle cx="1010" cy="60" r="3"/><circle cx="1040" cy="60" r="3"/><circle cx="1070" cy="60" r="3"/>
    <circle cx="1010" cy="92" r="3"/><circle cx="1070" cy="92" r="3"/><circle cx="1100" cy="92" r="3"/>
    <circle cx="1040" cy="124" r="3"/><circle cx="1100" cy="124" r="3"/><circle cx="1130" cy="124" r="3"/>
    <circle cx="1070" cy="156" r="3"/><circle cx="1130" cy="156" r="3"/>
  </g>

  <!-- droplet mark (from logo.svg), vertically centered, aligned with the wordmark -->
  <g transform="translate(23.5,8.5) scale(0.75)">
    <circle cx="128" cy="188" r="66" fill="url(#d-glow)"/>
    <g fill="url(#d-grad)">
      <rect x="54" y="62" width="148" height="15" rx="7.5"/>
      <rect x="74" y="92" width="108" height="15" rx="7.5"/>
      <rect x="95" y="122" width="66" height="15" rx="7.5"/>
    </g>
    <path d="M128 146 C150 178 160 190 160 204 a32 32 0 1 1 -64 0 c0-14 10-26 32-58 Z" fill="url(#d-grad)"/>
    <ellipse cx="117" cy="200" rx="10" ry="13" fill="#eafffb" fill-opacity=".8"/>
  </g>

  <text x="205" y="104" font-size="68" font-weight="800" letter-spacing="-2" fill="#e7e9ee">Dist<tspan fill="url(#g)">il</tspan></text>
  <text x="207" y="146" font-size="22" fill="#8b91a1">Compression with a <tspan fill="#e7e9ee" font-weight="600">quality contract</tspan>.</text>
  <text x="207" y="180" font-size="16" fill="#8b91a1">Compress your agent's context — and <tspan fill="#c9cdd6" font-weight="600">prove its decisions don't change.</tspan></text>
  <g transform="translate(207,200)">
    <rect width="336" height="26" rx="13" fill="#0f1219" stroke="#1b1f2a"/>
    <circle cx="17" cy="13" r="3.5" fill="#5ad19a"/>
    <text x="30" y="17" font-size="12" fill="#5ad1c9">certified non-inferior · 42.0% vs 39.2% on SWE-bench</text>
  </g>
</svg>
