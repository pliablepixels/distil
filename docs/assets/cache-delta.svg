<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" font-family="Inter,ui-sans-serif,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="cdbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0c13"/><stop offset="1" stop-color="#06070b"/></linearGradient>
    <linearGradient id="cdg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <linearGradient id="cdcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12151f"/><stop offset="1" stop-color="#0b0d15"/></linearGradient>
    <pattern id="cddots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.022"/></pattern>
    <filter id="cdsh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.5"/></filter>
    <marker id="cdar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5ad1c9"/></marker>
  </defs>
  <rect width="1200" height="440" fill="url(#cdbg)"/>
  <rect width="1200" height="440" fill="url(#cddots)"/>

  <text x="48" y="52" font-size="23" font-weight="800" letter-spacing="-0.3" fill="#f2f3f7">Cache-delta coding <tspan fill="#8b91a3" font-weight="500" font-size="15">— the coding-agent hot path: read → edit → re-read</tspan></text>

  <!-- timeline rail -->
  <line x1="70" y1="120" x2="1130" y2="120" stroke="#252c3e" stroke-width="2"/>
  <g font-size="11.5" fill="#5b6177" font-weight="600" text-anchor="middle">
    <circle cx="190" cy="120" r="5" fill="#8b7bff"/><text x="190" y="100">turn 3 · read</text>
    <circle cx="470" cy="120" r="5" fill="#8b7bff"/><text x="470" y="100">turn 7 · edit</text>
    <circle cx="800" cy="120" r="5" fill="#5ad1c9"/><text x="800" y="100">turn 8 · RE-READ</text>
  </g>

  <!-- read card -->
  <g transform="translate(96,150)"><rect width="188" height="86" rx="13" fill="url(#cdcard)" stroke="#252c3e" filter="url(#cdsh)"/>
    <text x="16" y="28" font-size="12.5" font-weight="700" fill="#eef0f5">file.py</text>
    <text x="16" y="48" font-size="10.5" fill="#8b91a3">full contents</text>
    <rect x="16" y="58" width="156" height="14" rx="4" fill="#1b2030"/><rect x="16" y="58" width="156" height="14" rx="4" fill="#8b7bff" opacity="0.5"/>
    <text x="172" y="48" font-size="11" text-anchor="end" fill="#5ad1c9">1063 tok</text>
  </g>

  <!-- edit card -->
  <g transform="translate(388,150)"><rect width="160" height="86" rx="13" fill="url(#cdcard)" stroke="#252c3e" filter="url(#cdsh)"/>
    <text x="16" y="28" font-size="12.5" font-weight="700" fill="#eef0f5">Edit file.py</text>
    <text x="16" y="48" font-size="10.5" fill="#8b91a3">one function</text>
    <text x="16" y="68" font-size="10.5" fill="#ff8a6b">changed</text>
  </g>

  <!-- re-read: two outcomes -->
  <text x="660" y="172" font-size="11" font-weight="700" letter-spacing="1.5" fill="#5b6177">RE-READ — TWO WAYS</text>

  <!-- naive / exact-dedup -->
  <g transform="translate(660,186)"><rect width="220" height="70" rx="12" fill="#0e1320" stroke="#3a2330"/>
    <text x="14" y="26" font-size="11.5" font-weight="700" fill="#ff8a6b">exact-dedup (competitors)</text>
    <text x="14" y="45" font-size="10.5" fill="#9aa1b3">not identical → re-sends whole file</text>
    <rect x="14" y="52" width="192" height="9" rx="3" fill="#ff8a6b" opacity="0.55"/>
    <text x="206" y="26" font-size="11" text-anchor="end" fill="#ff8a6b">1063</text>
  </g>
  <!-- distil cache-delta -->
  <g transform="translate(660,268)"><rect width="220" height="70" rx="12" fill="#0e1320" stroke="#23402f"/>
    <text x="14" y="26" font-size="11.5" font-weight="700" fill="#5ad19a">distil cache-delta</text>
    <text x="14" y="45" font-size="10.5" fill="#9aa1b3">reference + diff of the one hunk</text>
    <rect x="14" y="52" width="28" height="9" rx="3" fill="#5ad19a"/>
    <text x="206" y="26" font-size="11" text-anchor="end" fill="#5ad19a">161</text>
  </g>

  <!-- arrows from re-read node -->
  <g fill="none" stroke="#5b6177" stroke-width="1.5"><path d="M800,128 C800,160 700,170 658,200" marker-end="url(#cdar)"/><path d="M800,128 C800,210 700,270 658,294" marker-end="url(#cdar)"/></g>

  <!-- savings callout -->
  <g transform="translate(916,196)"><rect width="236" height="142" rx="15" fill="url(#cdcard)" stroke="url(#cdg)" stroke-width="1.4" filter="url(#cdsh)"/>
    <text x="118" y="40" text-anchor="middle" font-size="34" font-weight="800" fill="url(#cdg)">85%</text>
    <text x="118" y="62" text-anchor="middle" font-size="11" fill="#8b91a3">of the re-read elided</text>
    <text x="118" y="92" text-anchor="middle" font-size="10.5" fill="#cdd3e2">902 tokens saved · reversible</text>
    <text x="118" y="112" text-anchor="middle" font-size="10.5" fill="#cdd3e2">via <tspan fill="#eef0f5" font-weight="600">distil_expand</tspan></text>
    <text x="118" y="130" text-anchor="middle" font-size="10" fill="#5b6177">decision-equivalent</text>
  </g>

  <!-- footer principle -->
  <g transform="translate(70,372)"><rect width="1060" height="44" rx="12" fill="#0b0d15" stroke="#1b2030"/>
    <text x="20" y="28" font-size="12.5" fill="#8b91a3"><tspan fill="#5ad1c9" font-weight="700">cache-monotonic:</tspan> only the volatile suffix is touched — the cached prefix stays byte-identical, so prompt-cache hits survive. The prior version is still in context, so reference + diff is decision-equivalent.</text>
  </g>
</svg>
