<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" font-family="Inter,ui-sans-serif,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b0c13"/><stop offset="1" stop-color="#06070b"/></linearGradient>
    <radialGradient id="vig" cx="0.74" cy="-0.05" r="0.85"><stop offset="0" stop-color="#1a1640" stop-opacity="0.55"/><stop offset="1" stop-color="#06070b" stop-opacity="0"/></radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#12151f"/><stop offset="1" stop-color="#0b0d15"/></linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141a2e"/><stop offset="1" stop-color="#0c0f1d"/></linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.025"/></pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000000" flood-opacity="0.55"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7390"/></marker>
    <marker id="arg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7d8cff"/></marker>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#dots)"/>
  <rect width="1200" height="360" fill="url(#vig)"/>
  <text x="40" y="44" font-size="22" font-weight="800" fill="#f2f3f7">Install your way <tspan font-size="14" font-weight="400" fill="#8b91a3">— stdlib-only core, zero runtime deps, corpus bundled</tspan></text>

  <!-- 3 cols (x 40/421/802, w 357), 2 rows (y 84/218, h 110) -->
  <!-- row 0 -->
  <g transform="translate(40,84)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">ZERO INSTALL</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">uvx distil bench</text><text x="18" y="96" font-size="10.5" fill="#5b6177">nothing to install — run it straight from PyPI</text></g>
  <g transform="translate(421,84)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">PYPI</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">pip install distil-llm</text><text x="18" y="96" font-size="10.5" fill="#5b6177">zero deps · corpus bundled in the wheel</text></g>
  <g transform="translate(802,84)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">HOMEBREW</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">brew install dshakes/tap/distil</text><text x="18" y="96" font-size="10.5" fill="#5b6177">macOS · Linux</text></g>

  <!-- row 1 -->
  <g transform="translate(40,218)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">CONTAINER</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">docker run distil bench</text><text x="18" y="96" font-size="10.5" fill="#5b6177">tiny, reproducible image</text></g>
  <g transform="translate(421,218)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">SINGLE FILE</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">python distil.pyz bench</text><text x="18" y="96" font-size="10.5" fill="#5b6177">one portable executable, no install</text></g>
  <g transform="translate(802,218)"><rect width="357" height="110" rx="14" fill="url(#card)" stroke="#252c3e" filter="url(#sh)"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><rect x="325" y="12" width="20" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" font-weight="600" fill="#5ad1c9">NODE LAUNCHER</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#eef0f5">npx @distil/proxy</text><text x="18" y="96" font-size="10.5" fill="#5b6177">for JS/TS stacks — wraps the Python proxy</text></g>
</svg>
