<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <text x="40" y="44" font-size="22" font-weight="800" fill="#e7e9ee">Install your way <tspan font-size="14" font-weight="400" fill="#8b91a1">— stdlib-only core, zero runtime deps, corpus bundled</tspan></text>

  <!-- 3 cols (x 40/421/802, w 357), 2 rows (y 84/218, h 110) -->
  <!-- row 0 -->
  <g transform="translate(40,84)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">ZERO INSTALL</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">uvx distil bench</text><text x="18" y="96" font-size="10.5" fill="#5b6173">nothing to install — run it straight from PyPI</text></g>
  <g transform="translate(421,84)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">PYPI</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">pip install distil-llm</text><text x="18" y="96" font-size="10.5" fill="#5b6173">zero deps · corpus bundled in the wheel</text></g>
  <g transform="translate(802,84)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">HOMEBREW</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">brew install dshakes/tap/distil</text><text x="18" y="96" font-size="10.5" fill="#5b6173">macOS · Linux</text></g>

  <!-- row 1 -->
  <g transform="translate(40,218)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">CONTAINER</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">docker run distil bench</text><text x="18" y="96" font-size="10.5" fill="#5b6173">tiny, reproducible image</text></g>
  <g transform="translate(421,218)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">SINGLE FILE</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">python distil.pyz bench</text><text x="18" y="96" font-size="10.5" fill="#5b6173">one portable executable, no install</text></g>
  <g transform="translate(802,218)"><rect width="357" height="110" rx="14" fill="#0c0e14" stroke="#23284a"/><rect x="18" y="22" width="30" height="3" rx="1.5" fill="url(#g)"/><text x="18" y="44" font-size="11" letter-spacing="1.5" fill="#5ad1c9">NODE LAUNCHER</text><text x="18" y="74" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e7e9ee">npx @distil/proxy</text><text x="18" y="96" font-size="10.5" fill="#5b6173">for JS/TS stacks — wraps the Python proxy</text></g>
</svg>
