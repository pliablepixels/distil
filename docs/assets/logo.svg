<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="distil">
  <title>distil</title>
  <defs>
    <linearGradient id="d-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad1c9"/>
      <stop offset=".5" stop-color="#5ad19a"/>
      <stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <linearGradient id="d-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12151d"/>
      <stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <radialGradient id="d-glow" cx=".5" cy=".76" r=".46">
      <stop offset="0" stop-color="#5ad1c9" stop-opacity=".55"/>
      <stop offset="1" stop-color="#5ad1c9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile with gradient edge glow -->
  <rect x="6" y="6" width="244" height="244" rx="58" fill="url(#d-tile)"/>
  <rect x="7.5" y="7.5" width="241" height="241" rx="56.5" fill="none" stroke="url(#d-grad)" stroke-width="3" stroke-opacity=".9"/>

  <!-- pooled essence glow under the droplet -->
  <circle cx="128" cy="188" r="66" fill="url(#d-glow)"/>

  <!-- distillation funnel: broad context narrowing down -->
  <g fill="url(#d-grad)">
    <rect x="54"  y="62"  width="148" height="15" rx="7.5"/>
    <rect x="74"  y="92"  width="108" height="15" rx="7.5"/>
    <rect x="95"  y="122" width="66"  height="15" rx="7.5"/>
  </g>

  <!-- the distilled droplet (essence) -->
  <path d="M128 146 C150 178 160 190 160 204 a32 32 0 1 1 -64 0 c0-14 10-26 32-58 Z" fill="url(#d-grad)"/>
  <ellipse cx="117" cy="200" rx="10" ry="13" fill="#eafffb" fill-opacity=".8"/>
</svg>
