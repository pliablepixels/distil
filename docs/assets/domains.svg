  <text x="40" y="424" font-size="13" fill="#8b91a1">aggregate: <tspan fill="#5ad1c9" font-weight="700">26.8% cheaper</tspan>, losslessly · <tspan fill="#e7e9ee">5,761 tokens</tspan> causally prunable · <tspan fill="#5ad19a">GATE: PASS</tspan></text>
