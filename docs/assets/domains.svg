    <text x="600" y="0">DISTIL</text>
    <text x="730" y="0">AGGRESSIVE</text>
    <text x="900" y="0">TOKENS PRUNED</text>
  </g>
  <line x1="40" y1="116" x2="1160" y2="116" stroke="#1b1f2a"/>

