<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <text x="40" y="46" font-size="22" font-weight="700" fill="#e7e9ee">Measured across 7 domains <tspan fill="#5b6173" font-weight="400" font-size="14">— the same gate, not one cherry-picked example</tspan></text>
  <text x="40" y="72" font-size="13" fill="#8b91a1">Every trajectory: distil certified non-inferior, the gate rejects lossy aggression, savings are lossless. <tspan fill="#5ad1c9">distil bench</tspan></text>

