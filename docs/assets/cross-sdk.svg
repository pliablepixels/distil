<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6173"/></marker>
    <marker id="arr-accent" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b7bff"/></marker>
  </defs>
  <rect width="1200" height="440" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e7e9ee">One proxy, every SDK. <tspan fill="#5b6173" font-weight="400" font-size="14">— point any client at the same endpoint, no code changes required</tspan></text>

  <!-- ===== LEFT COLUMN: Client SDKs ===== -->
  <text x="70" y="88" font-size="11" font-weight="700" fill="#5b6173" letter-spacing="1">CLIENTS</text>

  <!-- Anthropic SDK -->
  <g transform="translate(30,96)">
    <rect width="190" height="48" rx="10" fill="#0c0e14" stroke="#23284a"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#e7e9ee">Anthropic SDK</text>
    <text x="14" y="36" font-size="10" fill="#5b6173">Py / TS</text>
    <text x="108" y="36" font-size="9" fill="#5ad1c9">baseURL → localhost</text>
  </g>

  <!-- OpenAI SDK -->
  <g transform="translate(30,158)">
    <rect width="190" height="48" rx="10" fill="#0c0e14" stroke="#23284a"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#e7e9ee">OpenAI SDK</text>
    <text x="14" y="36" font-size="10" fill="#5b6173">Py / TS / any</text>
    <text x="108" y="36" font-size="9" fill="#5ad1c9">baseURL → localhost</text>
  </g>

  <!-- Vercel AI SDK -->
  <g transform="translate(30,220)">
    <rect width="190" height="48" rx="10" fill="#0c0e14" stroke="#23284a"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#e7e9ee">Vercel AI SDK</text>
    <text x="14" y="36" font-size="10" fill="#5b6173">TypeScript</text>
    <text x="108" y="36" font-size="9" fill="#5ad1c9">baseURL → localhost</text>
  </g>

  <!-- LangChain -->
  <g transform="translate(30,282)">
    <rect width="190" height="48" rx="10" fill="#0c0e14" stroke="#23284a"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#e7e9ee">LangChain</text>
    <text x="14" y="36" font-size="10" fill="#5b6173">py / js</text>
    <text x="108" y="36" font-size="9" fill="#5ad1c9">baseURL → localhost</text>
  </g>

  <!-- LiteLLM -->
  <g transform="translate(30,344)">
    <rect width="190" height="48" rx="10" fill="#0c0e14" stroke="#23284a"/>
    <text x="14" y="20" font-size="12" font-weight="700" fill="#e7e9ee">LiteLLM</text>
    <text x="14" y="36" font-size="10" fill="#5b6173">proxy / SDK</text>
    <text x="108" y="36" font-size="9" fill="#5ad1c9">baseURL → localhost</text>
  </g>

  <!-- Arrows: clients → Distil -->
  <line x1="220" y1="120" x2="428" y2="192" stroke="#5b6173" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="182" x2="428" y2="206" stroke="#5b6173" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="244" x2="428" y2="220" stroke="#5b6173" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="306" x2="428" y2="238" stroke="#5b6173" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="368" x2="428" y2="252" stroke="#5b6173" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== MIDDLE COLUMN: Distil ===== -->
  <text x="478" y="88" font-size="11" font-weight="700" fill="#5b6173" letter-spacing="1">PROXY</text>

  <!-- Distil main box with accent gradient border -->
  <rect x="430" y="96" width="280" height="160" rx="16" fill="#0f1326" stroke="url(#g)" stroke-width="2"/>
  <text x="570" y="126" font-size="18" font-weight="700" fill="url(#g)" text-anchor="middle">Distil</text>
  <text x="570" y="146" font-size="11" fill="#8b91a1" text-anchor="middle">proxy · :8788</text>

  <!-- Sub-pills -->
  <rect x="452" y="158" width="236" height="24" rx="6" fill="#1a1c2e" stroke="#23284a"/>
  <text x="570" y="174" font-size="10" fill="#5ad1c9" text-anchor="middle">cache-aware compress</text>

  <rect x="452" y="188" width="236" height="24" rx="6" fill="#1a1c2e" stroke="#23284a"/>
  <text x="570" y="204" font-size="10" fill="#5ad19a" text-anchor="middle">lossless / reversible</text>

  <rect x="452" y="218" width="236" height="24" rx="6" fill="#1a1c2e" stroke="#23284a"/>
  <text x="570" y="234" font-size="10" fill="#ff8a6b" text-anchor="middle">auth-mode gating</text>

  <!-- In-process box -->
  <rect x="430" y="276" width="280" height="52" rx="12" fill="#0c0e14" stroke="#1b1f2a" stroke-dasharray="5,3"/>
  <text x="570" y="298" font-size="11" fill="#8b91a1" text-anchor="middle">or in-process:</text>
  <text x="570" y="316" font-size="11" font-weight="600" fill="#e7e9ee" text-anchor="middle">wrap(client)</text>

  <!-- Arrows: Distil → providers -->
  <line x1="710" y1="192" x2="878" y2="152" stroke="#8b7bff" stroke-width="1.5" marker-end="url(#arr-accent)"/>
  <line x1="710" y1="220" x2="878" y2="260" stroke="#8b7bff" stroke-width="1.5" marker-end="url(#arr-accent)"/>

  <!-- ===== RIGHT COLUMN: Providers ===== -->
  <text x="900" y="88" font-size="11" font-weight="700" fill="#5b6173" letter-spacing="1">PROVIDERS</text>

  <!-- Anthropic API -->
  <g transform="translate(880,96)">
    <rect width="240" height="72" rx="14" fill="#0f1219" stroke="#23284a"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#e7e9ee">Anthropic API</text>
    <text x="16" y="48" font-size="10.5" fill="#8b91a1">api.anthropic.com</text>
    <text x="16" y="64" font-size="10" fill="#5b6173">Claude 3, 4 · all models</text>
  </g>

  <!-- OpenAI-compatible -->
  <g transform="translate(880,208)">
    <rect width="240" height="72" rx="14" fill="#0f1219" stroke="#23284a"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#e7e9ee">OpenAI-compatible</text>
    <text x="16" y="48" font-size="10.5" fill="#8b91a1">OpenAI · Azure · Together</text>
    <text x="16" y="64" font-size="10" fill="#5b6173">Fireworks · Groq · …</text>
  </g>

  <!-- Caption at the bottom -->
  <rect x="30" y="408" width="1140" height="22" rx="6" fill="#0b0d16"/>
  <text x="600" y="423" font-size="11" fill="#5b6173" text-anchor="middle">no code change — point base_url at the proxy; works in any language</text>
</svg>
