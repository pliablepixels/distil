<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" font-family="ui-sans-serif,Segoe UI,Inter,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0b12"/><stop offset="1" stop-color="#06070a"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#5ad1c9"/></linearGradient>
    <marker id="am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5b6173"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b7bff"/></marker>
  </defs>
  <rect width="1200" height="470" fill="url(#bg)"/>

  <text x="40" y="44" font-size="22" font-weight="800" fill="#e7e9ee">One proxy, every SDK.<tspan font-size="14" font-weight="400" fill="#8b91a1">  — point any client at the proxy, no code change</tspan></text>

  <!-- column headers, centered on each column -->
  <g font-size="11" letter-spacing="1.5" fill="#5b6173" text-anchor="middle">
    <text x="190" y="92">CLIENTS</text>
    <text x="615" y="92">PROXY · :8788</text>
    <text x="1020" y="92">PROVIDERS</text>
  </g>

  <!-- arrows first (behind boxes): clients funnel into proxy left-center, providers fan from proxy right-center -->
  <g fill="none" stroke="#5b6173" stroke-width="1.4">
    <line x1="340" y1="148" x2="467" y2="276" marker-end="url(#am)"/>
    <line x1="340" y1="212" x2="467" y2="276" marker-end="url(#am)"/>
    <line x1="340" y1="276" x2="467" y2="276" marker-end="url(#am)"/>
    <line x1="340" y1="340" x2="467" y2="276" marker-end="url(#am)"/>
    <line x1="340" y1="404" x2="467" y2="276" marker-end="url(#am)"/>
  </g>
  <g fill="none" stroke="#8b7bff" stroke-width="1.6" opacity="0.9">
    <line x1="760" y1="276" x2="877" y2="229" marker-end="url(#ag)"/>
    <line x1="760" y1="276" x2="877" y2="331" marker-end="url(#ag)"/>
  </g>

  <!-- client boxes: x=40 w=300 h=56, tops 120/184/248/312/376 (centers 148/212/276/340/404) -->
  <g>
    <g transform="translate(40,120)"><rect width="300" height="56" rx="10" fill="#0c0e14" stroke="#23284a"/><text x="16" y="24" font-size="13" font-weight="700" fill="#e7e9ee">Anthropic SDK</text><text x="16" y="42" font-size="10.5" fill="#8b91a1">Python · TS</text><text x="284" y="42" font-size="10.5" text-anchor="end" fill="#5ad1c9">base_url → :8788</text></g>
    <g transform="translate(40,184)"><rect width="300" height="56" rx="10" fill="#0c0e14" stroke="#23284a"/><text x="16" y="24" font-size="13" font-weight="700" fill="#e7e9ee">OpenAI SDK</text><text x="16" y="42" font-size="10.5" fill="#8b91a1">Python · TS</text><text x="284" y="42" font-size="10.5" text-anchor="end" fill="#5ad1c9">base_url → :8788/v1</text></g>
    <g transform="translate(40,248)"><rect width="300" height="56" rx="10" fill="#0c0e14" stroke="#23284a"/><text x="16" y="24" font-size="13" font-weight="700" fill="#e7e9ee">Vercel AI SDK</text><text x="16" y="42" font-size="10.5" fill="#8b91a1">TypeScript</text><text x="284" y="42" font-size="10.5" text-anchor="end" fill="#5ad1c9">baseURL → :8788</text></g>
    <g transform="translate(40,312)"><rect width="300" height="56" rx="10" fill="#0c0e14" stroke="#23284a"/><text x="16" y="24" font-size="13" font-weight="700" fill="#e7e9ee">LangChain</text><text x="16" y="42" font-size="10.5" fill="#8b91a1">Python · JS</text><text x="284" y="42" font-size="10.5" text-anchor="end" fill="#5ad1c9">base_url → :8788</text></g>
    <g transform="translate(40,376)"><rect width="300" height="56" rx="10" fill="#0c0e14" stroke="#23284a"/><text x="16" y="24" font-size="13" font-weight="700" fill="#e7e9ee">LiteLLM</text><text x="16" y="42" font-size="10.5" fill="#8b91a1">Python</text><text x="284" y="42" font-size="10.5" text-anchor="end" fill="#5ad1c9">api_base → :8788</text></g>
  </g>

  <!-- proxy box: x=470 w=290, y=186 h=180, vertical center y=276 -->
  <rect x="470" y="186" width="290" height="180" rx="16" fill="#0b0d16" stroke="#5ad1c9" stroke-width="1.5"/>
  <text x="615" y="218" text-anchor="middle" font-size="22" font-weight="800" fill="url(#g)">Distil</text>
  <text x="615" y="238" text-anchor="middle" font-size="11.5" fill="#8b91a1">proxy · localhost:8788</text>
  <g text-anchor="middle">
    <rect x="490" y="252" width="250" height="28" rx="8" fill="#0f1219" stroke="#1b1f2a"/><text x="615" y="270" font-size="12" fill="#5ad1c9">cache-aware compress</text>
    <rect x="490" y="288" width="250" height="28" rx="8" fill="#0f1219" stroke="#1b1f2a"/><text x="615" y="306" font-size="12" fill="#5ad19a">lossless · reversible</text>
    <rect x="490" y="324" width="250" height="28" rx="8" fill="#0f1219" stroke="#1b1f2a"/><text x="615" y="342" font-size="12" fill="#ff8a6b">auth-mode gating</text>
  </g>

  <!-- in-process alternative -->
  <rect x="470" y="384" width="290" height="52" rx="14" fill="#0b0d16" stroke="#23284a" stroke-dasharray="5 4"/>
  <text x="615" y="406" text-anchor="middle" font-size="10.5" fill="#5b6173">or in-process</text>
  <text x="615" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#e7e9ee">wrap(client)</text>

  <!-- provider boxes: x=880 w=280 h=82, tops 188/290 (centers 229/331) -->
  <g transform="translate(880,188)"><rect width="280" height="82" rx="14" fill="#0c0e14" stroke="#23284a"/><text x="18" y="30" font-size="14" font-weight="700" fill="#e7e9ee">Anthropic API</text><text x="18" y="52" font-size="11" fill="#8b91a1">api.anthropic.com</text><text x="18" y="70" font-size="10" fill="#5b6173">Claude — all models</text></g>
  <g transform="translate(880,290)"><rect width="280" height="82" rx="14" fill="#0c0e14" stroke="#23284a"/><text x="18" y="30" font-size="14" font-weight="700" fill="#e7e9ee">OpenAI-compatible</text><text x="18" y="52" font-size="11" fill="#8b91a1">OpenAI · Azure · Together</text><text x="18" y="70" font-size="10" fill="#5b6173">Fireworks · Groq · …</text></g>

  <text x="600" y="456" text-anchor="middle" font-size="12.5" fill="#8b91a1">no code change — point <tspan fill="#e7e9ee">base_url</tspan> at the proxy; works in any language</text>
</svg>
